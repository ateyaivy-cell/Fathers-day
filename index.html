<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Father's Day, Dad! 🎁</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="gift-container" id="giftBox">
        <div class="bow"></div>
        <div class="gift-box">
            <div class="ribbon-h"></div>
            <div class="ribbon-v"></div>
        </div>
        <div class="tap-text">Tap to Open 🎁</div>
    </div>

    <div id="message-content">
        <h1 class="main-title">HAPPY<br>FATHER'S DAY,<br>DAD! 🎸</h1>
        <p class="personal-msg">
            Thanks for always being my anchor, sharing your wisdom, and having my back no matter what. You're the absolute best, and today is all about celebrating you!
        </p>
        <div class="signature">Love, [Ivy] ❤️</div>
    </div>

    <script src="main.js"></script>
</body>
</html>
